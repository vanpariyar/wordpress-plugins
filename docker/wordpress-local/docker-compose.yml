services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - wp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:6.8-php8.2-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8888:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
    volumes:
      - ../../plugins/post-to-speech:/var/www/html/wp-content/plugins/post-to-speech
      - ./config/wp-config.php:/var/www/html/wp-config.php:ro
      - ./config/wp-config-debug.php:/var/www/html/wp-config-debug.php:ro
      - ./entrypoint-local.sh:/usr/local/bin/entrypoint-local.sh:ro
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./wp-content:/var/www/html/wp-content/local-dev
    command: [ "bash", "/usr/local/bin/entrypoint-local.sh" ]

volumes:
  wp_db_data:
